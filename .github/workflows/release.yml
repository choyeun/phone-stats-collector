name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Update version from tag + build number
        id: version
        run: |
          BASE_VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUM="${{ github.run_number }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          FULL_VERSION="${BASE_VERSION}.${BUILD_NUM}"
          sed -i "s/versionName = .*/versionName = \"$FULL_VERSION\"/" app/build.gradle.kts
          sed -i "s/versionCode = [0-9][0-9]*/versionCode = $BUILD_NUM/" app/build.gradle.kts
          echo "Version set to $FULL_VERSION (build $BUILD_NUM)"
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "build_num=$BUILD_NUM" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Decode persistent keystore
        run: |
          base64 --decode <<< "${{ secrets.KEYSTORE_BASE64 }}" > app/bgmonitor.keystore

      - name: Build APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleDebug

      - name: Create Release and Upload APK
        env:
          GH_TOKEN: ${{ github.token }}
          FULL_VERSION: ${{ steps.version.outputs.full_version }}
          BUILD_NUM: ${{ steps.version.outputs.build_num }}
          TIMESTAMP: ${{ steps.version.outputs.timestamp }}
        run: |
          APK_NAME="BGMonitor-${FULL_VERSION}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$APK_NAME"
          gh release create "${{ github.ref_name }}" \
            --title "v${FULL_VERSION} (build ${BUILD_NUM})" \
            --notes "버전: v${FULL_VERSION} (build ${BUILD_NUM})  ·  빌드시각: ${TIMESTAMP}" \
            "$APK_NAME"