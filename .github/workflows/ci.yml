name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate debug keystore (for signing)
        run: |
          keytool -genkey -v -keystore app/debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android -dname "CN=,OU=,O=,L=,S=,C=" || true

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Run Android Lint
        run: ./gradlew lint --no-build-cache || true

      - name: Run unit tests
        run: ./gradlew test --no-build-cache || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bgmonitor-apk
          path: app/build/outputs/apk/release/app-release.apk